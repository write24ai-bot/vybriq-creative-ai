kind = "web"
previewPath = "/"
title = "Vybriq"
version = "1.0.0"
id = "artifacts/vybriq"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24231

[services.development]
run = "pnpm --filter @workspace/vybriq run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vybriq", "run", "build" ]
publicDir = "artifacts/vybriq/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24231"
BASE_PATH = "/"
